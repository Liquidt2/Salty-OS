# ═══════════════════════════════════════════
# Salty OS — Full Stack Production Deployment
# Includes: Frontend, Backend, and PostgreSQL DB
# Deploy: docker compose up -d --build
# ═══════════════════════════════════════════

services:
  # Database
  db:
    image: postgres:15-alpine
    container_name: salty-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-saltyos}
      - POSTGRES_USER=${DB_USER:-salty}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-saltyos_secret}
    volumes:
      - salty-db-data:/var/lib/postgresql/data
    networks:
      - agent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-salty} -d ${DB_NAME:-saltyos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # React Frontend (Nginx)
  salty-os:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salty-os
    restart: unless-stopped
    ports:
      - "${SALTY_PORT:-3000}:3000"
    depends_on:
      salty-api:
        condition: service_healthy
    networks:
      - agent-network

  # Express API Backend
  salty-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: salty-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      - API_PORT=3001
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-saltyos}
      - DB_USER=${DB_USER:-salty}
      - DB_PASSWORD=${DB_PASSWORD:-saltyos_secret}
      - SALTY_AUTH_TOKEN=${SALTY_AUTH_TOKEN:-}
      - AGENT_ZERO_URL=http://openclaw:5000
      - N8N_URL=http://n8n:5678
      - POSTIZ_URL=http://postiz:5000
      - GOTENBERG_URL=http://gotenberg:3000
      - FIRECRAWL_URL=http://firecrawl:3002
      - STIRLING_URL=http://stirling-pdf:8080
      - TZ=${TZ:-America/Chicago}
    volumes:
      - salty-data:/app/data
      - salty-backups:/app/backups
      - ./public/uploads:/app/public/uploads
      - ./openclaw-skills:/app/openclaw-skills
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agent-network

volumes:
  salty-data:
    name: salty-os-data
  salty-backups:
    name: salty-os-backups
  salty-db-data:
    name: salty-os-db-data

networks:
  agent-network:
    name: agent-network
    driver: bridge
